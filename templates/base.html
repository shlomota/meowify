<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meowify 🐱</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3 py-2">
  <a class="navbar-brand fw-bold" href="/">🐱 Meowify</a>
  {% if user %}
  <div class="d-flex align-items-center gap-3">
    <span class="text-light small">
      {% if user.picture %}
      <img src="{{ user.picture }}" width="28" height="28" class="rounded-circle me-1" referrerpolicy="no-referrer">
      {% endif %}
      {{ user.name }}
    </span>
    <span class="badge bg-secondary">{{ user.credits }} credit{{ 's' if user.credits != 1 else '' }}</span>
    <a href="/logout" class="btn btn-outline-light btn-sm">Sign out</a>
  </div>
  {% endif %}
</nav>

<div class="container py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
