<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meowify</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body class="bg-light">

<nav class="navbar bg-white border-bottom px-4 py-2">
  <a class="navbar-brand fw-bold text-dark" href="/">Meowify</a>
  {% if user %}
  <div class="d-flex align-items-center gap-3">
    {% if user.picture %}
    <img src="{{ user.picture }}" width="30" height="30" class="rounded-circle" referrerpolicy="no-referrer">
    {% endif %}
    <span class="text-muted small">{{ user.name }}</span>
    <span class="badge bg-light text-dark border">{{ user.credits }} credit{{ 's' if user.credits != 1 else '' }}</span>
    <a href="/logout" class="text-muted small text-decoration-none">Sign out</a>
  </div>
  {% endif %}
</nav>

<div class="container py-5">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
